# Portal Scanner Configuration
# Personalized for Selena Liu: Enterprise Supply Chain Systems & Integration.

location_filter:
  allow:
    - "Remote"
    - "United States"
    - "USA"
    - "Austin"
    - "Texas"
    - "TX"
  block: []

title_filter:
  positive:
    - "Supply Chain Systems Analyst"
    - "Business Systems Analyst"
    - "Business Systems Analyst, Supply Chain"
    - "IT Systems Analyst"
    - "Systems Integration Analyst"
    - "WMS"
    - "Warehouse Systems Analyst"
    - "Supply Chain Technology Analyst"
    - "Operations Systems Analyst"
    - "Technical Product Owner"
    - "Product Owner"
    - "Product Owner, Supply Chain Systems"
    - "Implementation Manager"
    - "Program Manager"
    - "Supply Chain Systems"
    - "Warehouse Automation"
    - "Enterprise Systems"
    - "ERP"
    - "SAP"
    - "Infor WMS"
    - "Kinaxis"
    - "RapidResponse"
    - "Logistics Systems"
    - "Inventory Systems"
    - "Order Management"
    - "Fulfillment Systems"
    - "Systems Integration"
    - "Vendor Integration"
    - "Production Support"
    - "Deployment"
    - "Rollout"
    - "Go-live"
  negative:
    - "Warehouse Associate"
    - "Forklift"
    - "Picker"
    - "Packer"
    - "Driver"
    - "Retail Associate"
    - "Sales-only"
    - "Sales Only"
    - "Account Executive"
    - "Intern"
    - "Internship"
    - "New Grad"
    - "University Grad"
    - "Graduate Program"
    - "Senior Director"
    - "Director,"
    - "VP"
    - "Vice President"
    - "10+ years"
    - "10 years"
  seniority_boost:
    - "Analyst"
    - "Product Owner"
    - "Implementation"
    - "Program Manager"
    - "Lead"

search_queries:
  - name: Supply Chain Systems — Greenhouse/Ashby/Lever
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io OR site:jobs.ashbyhq.com OR site:jobs.lever.co "Supply Chain Systems Analyst" OR "Business Systems Analyst" OR "Systems Integration Analyst"'
    enabled: true
  - name: WMS and Warehouse Systems — All portals
    query: '"WMS" OR "Warehouse Management System" "Analyst" OR "Product Owner" OR "Implementation Manager" "Remote" OR "United States"'
    enabled: true
  - name: Supply Chain Product Owner — All portals
    query: '"Product Owner" "Supply Chain" OR "Warehouse" OR "Fulfillment" OR "Order Management" "Remote" OR "United States"'
    enabled: true
  - name: Enterprise Supply Chain Technology — All portals
    query: '"Supply Chain Technology" OR "Operations Systems" OR "Enterprise Systems" "Analyst" OR "Program Manager" "Remote" OR "United States"'
    enabled: true
  - name: Logistics and Inventory Systems — All portals
    query: '"Logistics Systems" OR "Inventory Systems" OR "Fulfillment Systems" "Analyst" OR "Business Systems" OR "Integration"'
    enabled: true
  - name: SAP / Infor / Kinaxis roles — All portals
    query: '"SAP" OR "Infor WMS" OR "Kinaxis RapidResponse" "Supply Chain" "Analyst" OR "Product Owner" OR "Implementation"'
    enabled: true

